# =========================================================================
# LTRtrace v1.0.1 — Conda Environment Specification
# =========================================================================
# Create:  conda env create -f environment.yaml
# Update:  conda env update -f environment.yaml
# Activate: conda activate ltrtrace
# =========================================================================

name: ltrtrace
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # ---- R core ----
  - r-base >=4.0
  - r-essentials

  # ---- R packages for LTRtrace ----
  - r-optparse
  - r-yaml
  - r-dplyr
  - r-stringr
  - r-readr
  - r-tidyr
  - r-ggplot2
  - r-scales
  - r-svglite
  - r-devtools

  # ---- Bioconductor ----
  - bioconductor-biostrings

  # ---- Core external tools for Phase 0 (De Novo LTR Annotation) ----
  - ltr_finder >=1.07
  - ltr_finder_parallel >=1.4
  - ltr_harvest_parallel >=1.3
  - genometools-genometools >=1.6
  - ltr_retriever >=3.0
  - perl >=5.26
  - perl-bioperl
  - tesorter >=1.5

  # ---- Tools for Phase 1-4 ----
  - cd-hit >=4.8
  - seqtk >=1.3
  - blast >=2.12

  # ---- Build tools (for R package compilation) ----
  - gcc_linux-64
  - gxx_linux-64
  - gfortran_linux-64
