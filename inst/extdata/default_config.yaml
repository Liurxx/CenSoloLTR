# =========================================================================
# CenSoloLTR v1.0.0 - Default Configuration
# =========================================================================
# Generated by: CenSoloLTR --gen-config <file>
#
# Usage:
#   CenSoloLTR --config config.yaml -g genome.fa -c cen.bed -o ./output
#
# Note: CLI arguments (e.g. -g, -c, -o) override values in this file.
# =========================================================================

# ---- Required Input Files ----
# These can also be specified on the command line (-g, -c, -o)
genome_file: ~
cen_bed_file: ~
outdir: "./CenSoloLTR_output"

# ---- Sample ----
# Auto-detected from genome filename if not set
sample_name: ~

# ---- Thread Configuration ----
threads: 8
ltr_threads: ~   # If null, uses the same value as 'threads'

# ---- External Tool Paths ----
# If null or omitted, auto-detection via PATH will be attempted.
# Specify absolute paths here if tools are not in PATH.
ltr_finder_path: ~
gt_path: ~
ltr_retriever_path: ~
ltr_retriever_dir: ~       # Path to LTR_retriever share/bin/ (for find_LTR.pl, solo_finder.pl)
tesorter_path: ~
seqtk_path: ~
cdhit_path: ~
blastn_path: ~
makeblastdb_path: ~

# ---- CD-HIT Parameters ----
cdhit_identity: 0.80      # Sequence identity cutoff (0-1)
cdhit_coverage: 0.80      # Alignment coverage cutoff for shorter seq (0-1)

# ---- BLAST Parameters ----
blast_evalue: 1.0e-5        # E-value cutoff for initial SoloLTR classification
blast_evalue_rescue: 1.0    # E-value cutoff for CEN/Peri-CEN rescue (relaxed)

# ---- CEN/Peri-CEN Region Parameters ----
peri_extension: 0.10        # Peri-CEN extension ratio relative to CEN size

# ---- Plot Parameters ----
top_families: 15            # Number of top families to display individually in plots

# ---- Pipeline Control ----
skip_phase0: false          # Skip Phase 0 (de novo LTR annotation)
skip_steps: ~               # Comma-separated step numbers to skip, e.g. "1,2"
only_steps: ~               # Run only these steps, e.g. "3,4,5"

# ---- Misc ----
quiet: false                # Suppress progress messages
