# =========================================================================
# CenSoloLTR v1.1.0 — Conda Environment
# =========================================================================
# Create: conda env create -f environment_latest.yaml
# Activate: conda activate censololtr
#
# Version constraints are removed so conda/mamba can resolve a
# compatible snapshot.  After creation, run:
#    CenSoloLTR --version
# to verify that every tool meets the minimum requirement.
# =========================================================================
name: censololtr
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # R base
  - r-base

  # Core LTR Detection
  - ltr_finder
  - ltr_finder_parallel
  - ltr_harvest_parallel
  - genometools-genometools

  # LTR_retriever & SoloLTR
  - ltr_retriever
  - repeatmasker
  - blast

  # Classification & Clustering
  - tesorter
  - cd-hit

  # Utilities
  - seqtk
  - samtools

  # Perl bio
  - perl-bioperl

  # R packages (CRAN)
  - r-optparse
  - r-yaml
  - r-dplyr
  - r-stringr
  - r-readr
  - r-tidyr
  - r-ggplot2
  - r-scales

  # Bioconductor
  - bioconductor-biostrings
