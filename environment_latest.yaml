# =========================================================================
# CenSoloLTR v1.1.0 — Conda Environment
# =========================================================================
# Create: mamba env create -f environment_latest.yaml
# Activate: conda activate censololtr
#
# nompi variants are forced on boost-cpp / hdf5 / fftw to prevent
# openmpi from being pulled in.  Its post-link script fails with
# "No such file or directory" on servers whose /bin/sh layout
# differs from the build host, and CenSoloLTR does not use MPI.
# =========================================================================
name: censololtr
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # R base
  - r-base

  # Core LTR Detection
  - ltr_finder
  - ltr_finder_parallel
  - ltr_harvest_parallel
  - genometools-genometools

  # LTR_retriever & SoloLTR
  - ltr_retriever
  - repeatmasker
  - blast

  # Classification & Clustering
  - tesorter
  - cd-hit

  # Utilities
  - seqtk
  - samtools

  # Perl bio
  - perl-bioperl

  # R packages (CRAN)
  - r-optparse
  - r-yaml
  - r-dplyr
  - r-stringr
  - r-readr
  - r-tidyr
  - r-ggplot2
  - r-scales

  # Bioconductor
  - bioconductor-biostrings

  # ---- Prevent openmpi from transitive pull-in ----
  - boost-cpp =*=nompi*
  - hdf5 =*=nompi*
  - fftw =*=nompi*
