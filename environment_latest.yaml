# =========================================================================
# LTRtrace v1.1.0 — Conda Environment
# =========================================================================
# Create: mamba env create -f environment_latest.yaml
# Activate: conda activate ltrtrace
# =========================================================================
name: ltrtrace
channels:
  - defaults
  - bioconda
  - conda-forge
dependencies:
  # R base
  - r-base

  # Core LTR Detection
  - ltr_finder
  - ltr_finder_parallel
  - ltr_harvest_parallel
  - genometools-genometools

  # LTR_retriever & SoloLTR
  - ltr_retriever
  - repeatmasker
  - blast

  # Classification & Clustering
  - tesorter
  - cd-hit

  # Utilities
  - seqtk
  - samtools

  # Perl bio
  - perl-bioperl

  # R packages (CRAN)
  - r-optparse
  - r-yaml
  - r-dplyr
  - r-stringr
  - r-readr
  - r-tidyr
  - r-ggplot2
  - r-scales
  - r-systemfonts
  - r-textshaping
  - r-svglite

  # Bioconductor
  - bioconductor-biostrings
